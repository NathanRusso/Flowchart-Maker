<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flowchart</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
    <h1 class="center"> Computer Science BS/MS 2025-2026 Flowchart</h1>
    <button id="uploadTemplateButton" class="button" type="button" onclick="uploadTemplate()" style="background-color: Crimson;">Upload Template &uarr;</button>
    <button id="downloadTemplateButton" class="button" type="button" onclick="downloadTemplate()" style="background-color: DarkOrange;">Save Template &darr;</button>
    <button id="pushYearButton" class="button" type="button" onclick="pushYear()" style="background-color: Gold;">Add Year +</button>
    <button id="popYearButton" class="button" type="button" onclick="popYear()" style="background-color: Green;">Remove Year -</button>
    <button id="showTransferButton" class="button" type="button" onclick="showTransferSection()" style="background-color: MediumBlue;">Add Transfer +</button>
    <button id="hideTransferButton" class="button" type="button" onclick="hideTransferSection()" style="background-color: MediumBlue; display: none;">Remove Transfer -</button>
    <button id="clearFlowchartButton" class="button" type="button" onclick="clearFlowchart()" style="background-color: DarkViolet; margin-bottom: 10px;">Clear Flowchart x</button>

    <div id="year-0" class="year" style="display: none">
        <div id="year-text-0" class="year-text"> Transfer </div>
        <div id="year-block-0" class="year-block">
            <div id="transfer" class="transfer"> </div>
        </div>
    </div>
    <div id="year-divider-1" class="year-divider" style="display: none;"></div>
