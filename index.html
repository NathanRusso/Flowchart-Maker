<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flowchart</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
    <h1> Computer Science BS/MS Flowchart</h1>
    <div id="c1" class="class" draggable="true" ondragstart="dragstartHandler(event)">Class 1</div>
    <div id="c2" class="class" draggable="true" ondragstart="dragstartHandler(event)">Class 2</div>
    <div id="c3" class="class" draggable="true" ondragstart="dragstartHandler(event)">Class 3</div>
    <div id="co1" class="coop" draggable="true" ondragstart="dragstartHandler(event)">Co-op</div>

    <div id="div1" class="semester" ondrop="dropHandler(event)" ondragover="dragoverHandler(event)">
    </div>

    <div class="year-divider"></div>

    <div id="div2" class="semester" ondrop="dropHandler(event)" ondragover="dragoverHandler(event)">
    </div>




    <script src="/js/dragdrop.js"></script>
</body>
</html>
