<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flowchart</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
    <h1> Computer Science Flowchart</h1>
    <div id="c1" class="credit-class" draggable="true" ondragstart="dragstartHandler(event)">Test to move 1</div>
    <div id="c2" class="credit-class" draggable="true" ondragstart="dragstartHandler(event)">Test to move 2</div>
    <div id="c3" class="credit-class" draggable="true" ondragstart="dragstartHandler(event)">Test to move 3</div>

    <div id="div1" ondrop="dropHandler(event)" ondragover="dragoverHandler(event)" style="border: 1px solid black; height: 200px;">
        
    </div>
    <div id="div2" ondrop="dropHandler(event)" ondragover="dragoverHandler(event)" style="border: 1px solid black; height: 200px;">
    
    </div>
    <script src="/js/dragdrop.js"></script>
</body>
</html>
